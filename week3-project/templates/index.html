<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docs Copilot — AI 文档问答</title>
    <style>
        :root {
            --bg-primary: #f7f7f8;
            --bg-secondary: #ffffff;
            --bg-user-msg: #2563eb;
            --bg-ai-msg: #ffffff;
            --text-primary: #1a1a2e;
            --text-secondary: #6b7280;
            --text-user-msg: #ffffff;
            --text-ai-msg: #1a1a2e;
            --border-color: #e5e7eb;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-full: 9999px;
            --transition: all 0.2s ease;
            --font-sans: -apple-system, BlinkMacSystemFont, "Noto Sans SC", sans-serif;
            --font-mono: "SF Mono", "Fira Code", Consolas, monospace;
            --max-width: 800px;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { height: 100%; }
        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100%;
            display: flex;
            flex-direction: column;
            line-height: 1.6;
        }

        /* Header */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow-sm);
            z-index: 10;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .header-logo {
            width: 34px; height: 34px;
            background: linear-gradient(135deg, var(--accent), #7c3aed);
            border-radius: var(--radius-sm);
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 16px; font-weight: 700;
        }
        .header h1 { font-size: 16px; font-weight: 600; }
        .header .subtitle { font-size: 12px; color: var(--text-secondary); }
        .header-status {
            font-size: 12px;
            color: var(--text-secondary);
            display: flex; align-items: center; gap: 6px;
        }
        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #22c55e;
        }
        .status-dot.offline { background: #ef4444; }

        /* Chat */
        .chat-container { flex: 1; overflow-y: auto; padding: 20px 16px; }
        .chat-messages { max-width: var(--max-width); margin: 0 auto; display: flex; flex-direction: column; gap: 18px; }

        /* Welcome */
        .welcome { text-align: center; padding: 40px 20px; }
        .welcome-icon {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, var(--accent), #7c3aed);
            border-radius: var(--radius-lg);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px; font-size: 24px; color: white;
        }
        .welcome h2 { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
        .welcome p { color: var(--text-secondary); font-size: 14px; max-width: 400px; margin: 0 auto 20px; }
        .quick-questions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .quick-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-full);
            padding: 7px 14px;
            font-size: 13px;
            cursor: pointer;
            transition: var(--transition);
            font-family: var(--font-sans);
            color: var(--text-primary);
        }
        .quick-btn:hover { border-color: var(--accent); color: var(--accent); }

        /* Messages */
        .message { display: flex; gap: 10px; max-width: 85%; animation: fadeIn 0.3s ease; }
        .message.user { flex-direction: row-reverse; align-self: flex-end; }
        .message.ai { align-self: flex-start; }
        .avatar {
            width: 32px; height: 32px;
            border-radius: var(--radius-sm);
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 600; flex-shrink: 0;
        }
        .message.user .avatar { background: var(--bg-user-msg); color: var(--text-user-msg); }
        .message.ai .avatar { background: #f0f4ff; color: var(--accent); }
        .bubble {
            padding: 10px 14px;
            border-radius: var(--radius-md);
            font-size: 14px; line-height: 1.7;
            word-break: break-word;
        }
        .message.user .bubble { background: var(--bg-user-msg); color: var(--text-user-msg); border-bottom-right-radius: 4px; }
        .message.ai .bubble { background: var(--bg-ai-msg); color: var(--text-ai-msg); border: 1px solid var(--border-color); border-bottom-left-radius: 4px; }
        .bubble code { background: #f3f4f6; padding: 2px 5px; border-radius: 4px; font-family: var(--font-mono); font-size: 12px; }
        .bubble pre { background: #1e1e2e; color: #cdd6f4; padding: 12px; border-radius: var(--radius-sm); overflow-x: auto; margin: 8px 0; font-size: 12px; }
        .bubble pre code { background: none; padding: 0; }

        /* Typing */
        .typing { display: flex; gap: 4px; padding: 4px 0; }
        .typing span { width: 6px; height: 6px; background: var(--text-secondary); border-radius: 50%; animation: bounce 1.4s infinite; opacity: 0.5; }
        .typing span:nth-child(1) { animation-delay: 0s; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        /* Sources */
        .sources { margin-top: 10px; border-top: 1px solid var(--border-color); padding-top: 8px; }
        .sources-toggle {
            background: none; border: none; color: var(--accent);
            font-size: 12px; cursor: pointer;
            display: flex; align-items: center; gap: 4px;
            font-family: var(--font-sans); padding: 3px 0;
        }
        .sources-toggle .arrow { display: inline-block; transition: transform 0.2s; font-size: 10px; }
        .sources-toggle.open .arrow { transform: rotate(90deg); }
        .sources-list { display: none; margin-top: 6px; list-style: none; }
        .sources-list.visible { display: block; }
        .sources-list li {
            font-size: 12px; color: var(--text-secondary);
            padding: 5px 8px; background: #f9fafb;
            border-radius: 4px; margin-bottom: 3px;
            border-left: 3px solid var(--accent);
        }
        .source-file { font-weight: 500; color: var(--text-primary); }
        .source-preview { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* Input */
        .input-area { background: var(--bg-secondary); border-top: 1px solid var(--border-color); padding: 14px 16px; }
        .input-wrapper { max-width: var(--max-width); margin: 0 auto; display: flex; gap: 10px; }
        .input-wrapper input {
            flex: 1; padding: 10px 14px;
            border: 1.5px solid var(--border-color); border-radius: var(--radius-md);
            font-size: 14px; font-family: var(--font-sans); outline: none;
            transition: var(--transition); background: var(--bg-primary);
        }
        .input-wrapper input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .send-btn {
            width: 42px; height: 42px;
            background: var(--accent); color: white; border: none;
            border-radius: var(--radius-md); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: var(--transition); font-size: 16px; flex-shrink: 0;
        }
        .send-btn:hover:not(:disabled) { background: var(--accent-hover); }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .input-hint { text-align: center; font-size: 11px; color: #9ca3af; margin-top: 6px; max-width: var(--max-width); margin-left: auto; margin-right: auto; }

        /* Error toast */
        .error-toast {
            position: fixed; top: 16px; left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: #fee2e2; color: #dc2626;
            padding: 10px 20px; border-radius: var(--radius-md);
            font-size: 13px; box-shadow: var(--shadow-md);
            z-index: 100; transition: transform 0.3s ease;
            border: 1px solid #fecaca;
        }
        .error-toast.show { transform: translateX(-50%) translateY(0); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0.6); } 40% { transform: scale(1); } }

        .chat-container::-webkit-scrollbar { width: 5px; }
        .chat-container::-webkit-scrollbar-track { background: transparent; }
        .chat-container::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <div class="header-logo">D</div>
        <div>
            <h1>Docs Copilot</h1>
            <span class="subtitle">AI 文档问答助手</span>
        </div>
    </div>
    <div class="header-status">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">连接中...</span>
    </div>
</div>

<div class="chat-container" id="chatContainer">
    <div class="chat-messages" id="chatMessages">
        <div class="welcome" id="welcome">
            <div class="welcome-icon">D</div>
            <h2>有什么想了解的？</h2>
            <p>我会从文档知识库中检索相关内容，基于真实内容为你解答。</p>
            <div class="quick-questions">
                <button class="quick-btn" onclick="askQuestion('React 有哪些常用 Hooks？')">React Hooks</button>
                <button class="quick-btn" onclick="askQuestion('Python 列表推导式怎么用？')">列表推导式</button>
                <button class="quick-btn" onclick="askQuestion('RESTful API 设计规范？')">RESTful API</button>
            </div>
        </div>
    </div>
</div>

<div class="error-toast" id="errorToast"></div>

<div class="input-area">
    <div class="input-wrapper">
        <input type="text" id="userInput" placeholder="输入你的问题..." onkeydown="handleKeyDown(event)">
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">&#10148;</button>
    </div>
    <div class="input-hint">Enter 发送</div>
</div>

<script>
const chatMessages = document.getElementById('chatMessages');
const chatContainer = document.getElementById('chatContainer');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const welcome = document.getElementById('welcome');
const errorToast = document.getElementById('errorToast');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');

let isStreaming = false;

// Check health
fetch('/api/health')
    .then(r => r.json())
    .then(data => {
        statusDot.classList.remove('offline');
        statusText.textContent = `${data.docs_count} 条文档已索引`;
    })
    .catch(() => {
        statusDot.classList.add('offline');
        statusText.textContent = '后端未启动';
    });

function scrollToBottom() { chatContainer.scrollTop = chatContainer.scrollHeight; }
function handleKeyDown(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function askQuestion(text) { userInput.value = text; sendMessage(); }
function showError(msg) { errorToast.textContent = msg; errorToast.classList.add('show'); setTimeout(() => errorToast.classList.remove('show'), 3000); }
function escapeHtml(text) { const d = document.createElement('div'); d.textContent = text; return d.innerHTML; }

function addMessage(role, content) {
    if (welcome) welcome.style.display = 'none';
    const div = document.createElement('div');
    div.className = `message ${role}`;
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? 'U' : 'AI';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = role === 'user' ? content : content;
    div.appendChild(avatar);
    div.appendChild(bubble);
    chatMessages.appendChild(div);
    scrollToBottom();
    return bubble;
}

function addStreamingMessage() {
    if (welcome) welcome.style.display = 'none';
    const div = document.createElement('div');
    div.className = 'message ai';
    div.innerHTML = '<div class="avatar">AI</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
    chatMessages.appendChild(div);
    scrollToBottom();
    return div.querySelector('.bubble');
}

function addSources(msgDiv, sources) {
    if (!sources || sources.length === 0) return;
    const bubble = msgDiv.querySelector('.bubble');
    const html = `
        <div class="sources">
            <button class="sources-toggle" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('visible')">
                <span class="arrow">&#9654;</span> 引用来源 (${sources.length})
            </button>
            <ul class="sources-list">${sources.map(s => `
                <li><span class="source-file">${escapeHtml(s.source)}</span><span class="source-preview">${escapeHtml(s.preview)}</span></li>
            `).join('')}</ul>
        </div>`;
    bubble.insertAdjacentHTML('beforeend', html);
}

async function sendMessage() {
    const question = userInput.value.trim();
    if (!question || isStreaming) return;

    isStreaming = true;
    sendBtn.disabled = true;
    userInput.value = '';

    addMessage('user', question);
    const bubble = addStreamingMessage();

    try {
        const response = await fetch('/api/ask/stream', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ question, top_k: 3, stream: true }),
        });

        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let fullText = '';
        let typingRemoved = false;

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = '';
            let currentEvent = '';

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                if (line.startsWith('event:')) {
                    currentEvent = line.slice(6).trim();
                } else if (line.startsWith('data:')) {
                    const data = line.slice(5).trim();
                    try {
                        const parsed = JSON.parse(data);
                        if (currentEvent === 'token') {
                            if (!typingRemoved) { bubble.innerHTML = ''; typingRemoved = true; }
                            fullText += parsed.text;
                            bubble.textContent = fullText;
                            scrollToBottom();
                        } else if (currentEvent === 'sources') {
                            addSources(bubble.parentElement, parsed);
                        } else if (currentEvent === 'error') {
                            showError(parsed.message || '出错了');
                        }
                    } catch(e) {
                        if (i === lines.length - 1) buffer = line;
                    }
                    currentEvent = '';
                }
            }
        }

        if (!typingRemoved) {
            bubble.textContent = '未收到回复，请重试';
        }

    } catch (err) {
        bubble.innerHTML = `<span style="color:#dc2626">请求失败: ${escapeHtml(err.message)}</span>`;
        showError('请求失败，请检查后端服务');
    } finally {
        isStreaming = false;
        sendBtn.disabled = false;
        userInput.focus();
    }
}
</script>

</body>
</html>
