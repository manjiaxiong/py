<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>练习 5：RAG 聊天界面</title>
    <style>
        /* ===== 练习：补全 CSS ===== */

        :root {
            --bg-primary: #f7f7f8;
            --bg-secondary: #ffffff;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --text-primary: #1a1a2e;
            --text-secondary: #6b7280;
            --border-color: #e5e7eb;
            --radius-md: 12px;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --max-width: 800px;
            --font-sans: -apple-system, BlinkMacSystemFont, "Noto Sans SC", sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header 样式 */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: var(--shadow-sm);
        }

        .header h1 { font-size: 18px; font-weight: 600; }

        /* 聊天容器样式 */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px 16px;
        }

        .chat-messages {
            max-width: var(--max-width);
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* 消息气泡样式 */
        .message {
            display: flex;
            gap: 10px;
            max-width: 80%;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.ai {
            align-self: flex-start;
        }

        .bubble {
            padding: 12px 16px;
            border-radius: var(--radius-md);
            font-size: 14px;
            line-height: 1.6;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .message.user .bubble {
            background: var(--accent);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.ai .bubble {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 4px;
        }

        .typing {
            color: var(--text-secondary);
            font-style: italic;
        }

        /* 输入区域 */
        .input-area {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            padding: 16px;
        }

        .input-wrapper {
            max-width: var(--max-width);
            margin: 0 auto;
            display: flex;
            gap: 10px;
        }

        .input-wrapper input {
            flex: 1;
            padding: 12px 16px;
            border: 1.5px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 14px;
            font-family: var(--font-sans);
            outline: none;
            transition: border-color 0.2s;
        }

        .input-wrapper input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .send-btn {
            width: 46px;
            height: 46px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 18px;
            transition: background 0.2s;
        }

        .send-btn:hover:not(:disabled) {
            background: var(--accent-hover);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 快捷问题 */
        .quick-questions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 16px;
        }

        .quick-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 13px;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .quick-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
    </style>
</head>
<body>

<!-- Header -->
<div class="header">
    <h1>RAG Chat 练习</h1>
</div>

<!-- Chat Area -->
<div class="chat-container" id="chatContainer">
    <div class="chat-messages" id="chatMessages">
        <div id="welcome" style="text-align: center; padding: 40px 20px;">
            <h2>Hi, 试试问个问题？</h2>
            <div class="quick-questions">
                <button class="quick-btn" onclick="askQuestion('React Hooks 有哪些？')">React Hooks</button>
                <button class="quick-btn" onclick="askQuestion('Python 列表推导式')">列表推导式</button>
                <button class="quick-btn" onclick="askQuestion('RESTful API 设计规范')">RESTful API</button>
            </div>
        </div>
    </div>
</div>

<!-- Input Area -->
<div class="input-area">
    <div class="input-wrapper">
        <input type="text" id="userInput" placeholder="输入问题..." onkeydown="handleKeyDown(event)">
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">&#10148;</button>
    </div>
</div>

<script>
// ===========================================
// 练习 5：SSE 流式聊天
// 补全以下函数
// ===========================================

const chatMessages = document.getElementById('chatMessages');
const chatContainer = document.getElementById('chatContainer');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const welcome = document.getElementById('welcome');

let isStreaming = false;

// 滚动到底部
function scrollToBottom() {
    chatContainer.scrollTop = chatContainer.scrollHeight;
}

// 键盘快捷键（Enter 发送，Shift+Enter 换行）
function handleKeyDown(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
}

// 快捷问题
function askQuestion(text) {
    userInput.value = text;
    sendMessage();
}

// 添加用户消息到界面
function addUserMessage(text) {
    if (welcome) welcome.style.display = 'none';

    const div = document.createElement('div');
    div.className = 'message user';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    div.appendChild(bubble);
    chatMessages.appendChild(div);
    scrollToBottom();
}

// 添加 AI 流式消息（返回 bubble 元素用于追加）
function addStreamingMessage() {
    if (welcome) welcome.style.display = 'none';

    const div = document.createElement('div');
    div.className = 'message ai';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<span class="typing">思考中...</span>';
    div.appendChild(bubble);
    chatMessages.appendChild(div);
    scrollToBottom();
    return bubble;
}

// 核心 — 发送消息 + SSE 流式接收
async function sendMessage() {
    const question = userInput.value.trim();
    if (!question || isStreaming) return;

    // UI 状态
    isStreaming = true;
    sendBtn.disabled = true;
    userInput.value = '';

    // 添加消息
    addUserMessage(question);
    const bubble = addStreamingMessage();

    try {
        // 发送 POST 请求到 /ask
        const response = await fetch('/ask', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ question }),
        });

        if (!response.ok) {
            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }

        // 读取 SSE 流
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let fullText = '';

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';  // 保留不完整的行

            for (const line of lines) {
                if (line.startsWith('data:')) {
                    try {
                        const data = JSON.parse(line.slice(5));
                        if (data.text) {
                            fullText += data.text;
                            bubble.textContent = fullText;
                            scrollToBottom();
                        }
                        if (data.done) break;
                    } catch(e) {
                        // 解析失败，忽略
                    }
                }
            }
        }

    } catch (err) {
        // 后端未启动时使用模拟回答
        await new Promise(r => setTimeout(r, 1000));
        bubble.textContent = `（后端未连接）你问的是: "${question}"\n启动后端后可以看到真实的流式回答`;
    } finally {
        isStreaming = false;
        sendBtn.disabled = false;
        userInput.focus();
    }
}
</script>

</body>
</html>
